<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#0a0c12" />
    <meta name="description" content="DL Enterprises Invoice System" />
    <title>DL Enterprises</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <style>
      /* ═══════════════════════════════════════
         CRITICAL STYLES — Load before React
         These ALWAYS apply, no JS needed
      ═══════════════════════════════════════ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #0a0c12;
        --card:    #141720;
        --card2:   #1a1e2d;
        --border:  #252a3d;
        --border2: #2e3452;
        --accent:  #f59e0b;
        --text:    #edf0f7;
        --muted:   #6b7490;
        --green:   #10b981;
        --red:     #ef4444;
        --blue:    #3b82f6;
        --sw:      210px; /* sidebar width */
      }

      html, body, #root {
        height: 100%;
        background: #0a0c12 !important;
        color: #edf0f7 !important;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Layout ── */
      .app-layout {
        display: flex;
        min-height: 100vh;
        background: #0a0c12;
      }

      /* ── DESKTOP sidebar ── */
      .desktop-sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 210px;
        background: #141720;
        border-right: 1px solid #252a3d;
        display: flex;
        flex-direction: column;
        z-index: 100;
        box-shadow: 4px 0 30px rgba(0,0,0,.5);
      }

      /* ── Main content — desktop pushes right ── */
      .main-content {
        margin-left: 210px;
        padding: 28px 30px;
        min-height: 100vh;
        background: #0a0c12;
        flex: 1;
        width: calc(100% - 210px);
        position: relative;
        z-index: 1;
      }

      /* ── MOBILE topbar — hidden on desktop ── */
      .mobile-topbar {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 58px;
        background: #141720;
        border-bottom: 1px solid #252a3d;
        z-index: 200;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        box-shadow: 0 2px 16px rgba(0,0,0,.5);
      }

      /* ── Mobile drawer — hidden on desktop ── */
      .mobile-drawer {
        display: none;
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 265px;
        background: #141720;
        border-right: 1px solid #252a3d;
        flex-direction: column;
        z-index: 300;
        box-shadow: 8px 0 40px rgba(0,0,0,.8);
        transform: translateX(-100%);
        transition: transform .28s cubic-bezier(.4,0,.2,1);
      }
      .mobile-drawer.open {
        transform: translateX(0) !important;
      }

      /* ── Overlay behind drawer ── */
      .drawer-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.75);
        z-index: 250;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .drawer-overlay.open {
        display: block !important;
      }

      /* ── Nav items ── */
      .nav-item {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 13px 18px;
        cursor: pointer;
        font-size: 13.5px;
        font-weight: 500;
        color: #6b7490;
        border-left: 3px solid transparent;
        transition: all .15s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-item:hover, .nav-item:active { background: rgba(255,255,255,.04); color: #edf0f7; }
      .nav-item.active { color: #f59e0b; border-left-color: #f59e0b; background: rgba(245,158,11,.09); }

      /* ── Buttons ── */
      input, select, textarea {
        width: 100%;
        background: #1a1e2d;
        border: 1px solid #252a3d;
        color: #edf0f7;
        padding: 10px 13px;
        border-radius: 9px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        -webkit-appearance: none;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #f59e0b;
        box-shadow: 0 0 0 3px rgba(245,158,11,.1);
      }
      input::placeholder, textarea::placeholder { color: #404764; }
      select option { background: #1a1e2d; color: #edf0f7; }

      /* ── Table ── */
      table { width: 100%; border-collapse: collapse; }
      th {
        padding: 11px 14px; font-size: 11px; font-weight: 700;
        color: #6b7490; text-transform: uppercase; letter-spacing: .5px;
        text-align: left; border-bottom: 1px solid #252a3d; background: #1a1e2d;
      }
      td {
        padding: 11px 14px; font-size: 13px;
        border-bottom: 1px solid rgba(37,42,58,.5);
        color: #edf0f7; background: #141720;
      }
      tbody tr:nth-child(even) td { background: #0f1219; }
      tbody tr:hover td { background: rgba(245,158,11,.04) !important; }
      tr:last-child td { border-bottom: none; }

      /* ── Scrollbar ── */
      * { scrollbar-width: thin; scrollbar-color: #2e3452 transparent; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-thumb { background: #2e3452; border-radius: 4px; }

      /* ── Spinner ── */
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ══════════════════════════════════════
         MOBILE — max-width 768px
      ══════════════════════════════════════ */
      @media (max-width: 768px) {
        /* Hide desktop sidebar completely */
        .desktop-sidebar {
          display: none !important;
        }

        /* Show mobile topbar */
        .mobile-topbar {
          display: flex !important;
        }

        /* Show mobile drawer (but still hidden until open) */
        .mobile-drawer {
          display: flex !important;
        }

        /* Push content down below topbar, no left margin */
        .main-content {
          margin-left: 0 !important;
          width: 100% !important;
          padding: 74px 14px 30px 14px !important;
        }

        /* Table: smaller text on mobile */
        th { padding: 9px 10px !important; font-size: 10px !important; }
        td { padding: 9px 10px !important; font-size: 12px !important; }

        /* Tighter headings */
        h1 { font-size: 18px !important; }
      }

      @media (max-width: 400px) {
        .main-content { padding: 70px 10px 24px 10px !important; }
        td, th { padding: 8px 8px !important; font-size: 11px !important; }
      }
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to use this app.</noscript>
    <div id="root"></div>
  </body>
</html>
