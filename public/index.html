<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0c12" />
    <meta name="description" content="DL Enterprises – Invoice Management System" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>DL Enterprises – Invoice System</title>
    <style>
      /* ── CRITICAL BASE STYLES – loaded before React ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #0a0c12;
        --bg2:      #0f1219;
        --card:     #141720;
        --card2:    #1a1e2d;
        --card3:    #1f2438;
        --border:   #252a3d;
        --border2:  #2e3452;
        --accent:   #f59e0b;
        --accent2:  #fbbf24;
        --text:     #edf0f7;
        --text2:    #b0b8cc;
        --muted:    #6b7490;
        --muted2:   #404764;
        --green:    #10b981;
        --red:      #ef4444;
        --blue:     #3b82f6;
        --sidebar-w: 210px;
      }

      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #0a0c12 !important;
        color: #edf0f7 !important;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        height: 100%;
        background: #0a0c12;
        color: #edf0f7;
      }

      /* Prevent white flash on load */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: #0a0c12;
        z-index: -1;
      }

      /* Scrollbar */
      * { scrollbar-width: thin; scrollbar-color: #2e3452 transparent; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2e3452; border-radius: 4px; }

      /* Layout */
      .app-layout { display: flex; min-height: 100vh; background: #0a0c12; }

      /* Sidebar */
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        width: 210px;
        background: #141720;
        border-right: 1px solid #252a3d;
        display: flex; flex-direction: column;
        z-index: 100;
        box-shadow: 4px 0 30px rgba(0,0,0,.5);
      }
      .main {
        margin-left: 210px;
        padding: 28px 30px;
        min-height: 100vh;
        background: #0a0c12;
        flex: 1;
        position: relative;
        z-index: 1;
      }

      /* Buttons */
      .btn {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 9px 18px; border-radius: 9px; border: none;
        cursor: pointer; font-size: 13px; font-weight: 600;
        font-family: inherit; transition: all .15s ease;
        white-space: nowrap;
      }
      .btn-primary { background: #f59e0b; color: #000; box-shadow: 0 2px 12px rgba(245,158,11,.35); }
      .btn-primary:hover { background: #fbbf24; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(245,158,11,.45); }
      .btn-ghost { background: transparent; color: #6b7490; border: 1px solid #2e3452; }
      .btn-ghost:hover { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,.05); }
      .btn-danger { background: rgba(239,68,68,.12); color: #ef4444; border: 1px solid rgba(239,68,68,.25); }
      .btn-green { background: rgba(16,185,129,.12); color: #10b981; border: 1px solid rgba(16,185,129,.25); }
      .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
      .btn-icon { padding: 7px; border-radius: 7px; }
      .btn:disabled { opacity: .45; cursor: not-allowed; }
      .w-full { width: 100%; justify-content: center; }

      /* Form inputs */
      .form-group { margin-bottom: 16px; }
      .form-group label {
        display: block; font-size: 11px; color: #6b7490;
        font-weight: 600; margin-bottom: 6px;
        text-transform: uppercase; letter-spacing: .5px;
      }
      input, select, textarea {
        width: 100%; background: #1a1e2d; border: 1px solid #252a3d;
        color: #edf0f7; padding: 10px 13px; border-radius: 9px;
        font-size: 13px; font-family: inherit; outline: none;
        transition: border .15s, box-shadow .15s;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #f59e0b;
        box-shadow: 0 0 0 3px rgba(245,158,11,.1);
      }
      input::placeholder, textarea::placeholder { color: #404764; }
      select option { background: #1a1e2d; color: #edf0f7; }

      /* Cards */
      .card {
        background: #141720;
        border: 1px solid #252a3d;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 2px 12px rgba(0,0,0,.4);
      }

      /* Table */
      .table-wrap { border-radius: 14px; overflow: hidden; border: 1px solid #252a3d; box-shadow: 0 2px 12px rgba(0,0,0,.4); }
      table { width: 100%; border-collapse: collapse; }
      th { padding: 12px 16px; font-size: 11px; font-weight: 700; color: #6b7490; text-transform: uppercase; letter-spacing: .6px; text-align: left; border-bottom: 1px solid #252a3d; background: #1a1e2d; }
      td { padding: 13px 16px; font-size: 13px; border-bottom: 1px solid rgba(37,42,58,.5); color: #edf0f7; background: #141720; }
      tbody tr:nth-child(even) td { background: #0f1219; }
      tbody tr:hover td { background: rgba(245,158,11,.04) !important; }
      tr:last-child td { border-bottom: none; }

      /* Badges */
      .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; }
      .badge-green  { background: rgba(16,185,129,.12); color: #10b981; border: 1px solid rgba(16,185,129,.2); }
      .badge-yellow { background: rgba(245,158,11,.12);  color: #f59e0b; border: 1px solid rgba(245,158,11,.2); }
      .badge-red    { background: rgba(239,68,68,.12);   color: #ef4444; border: 1px solid rgba(239,68,68,.2); }

      /* Modal */
      .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(6px); }
      .modal { background: #141720; border: 1px solid #2e3452; border-radius: 18px; width: 100%; max-width: 860px; max-height: 92vh; overflow-y: auto; padding: 28px; box-shadow: 0 30px 80px rgba(0,0,0,.7); }

      /* Pills */
      .pill-tabs { display: flex; gap: 7px; flex-wrap: wrap; }
      .pill { padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #2e3452; color: #6b7490; background: transparent; transition: all .15s; font-family: inherit; }
      .pill.active { background: #f59e0b; color: #000; border-color: #f59e0b; }
      .pill:hover:not(.active) { border-color: #f59e0b; color: #f59e0b; }

      /* Search */
      .search-wrap { position: relative; }
      .search-wrap input { padding-left: 38px; }
      .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #6b7490; pointer-events: none; }

      /* Spinner */
      .spinner { width: 38px; height: 38px; margin: 80px auto; border: 3px solid #252a3d; border-top-color: #f59e0b; border-radius: 50%; animation: spin .7s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Grid helpers */
      .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
      @media (max-width: 1100px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 700px) {
        .grid-4, .grid-2, .grid-3 { grid-template-columns: 1fr; }
        .main { margin-left: 0 !important; padding: 16px; }
        .sidebar { display: none; }
      }

      /* Sidebar nav */
      .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 18px; cursor: pointer; font-size: 13px; font-weight: 500; color: #6b7490; border-left: 3px solid transparent; transition: all .15s; }
      .nav-item:hover { color: #edf0f7; background: rgba(255,255,255,.03); }
      .nav-item.active { color: #f59e0b; border-left-color: #f59e0b; background: rgba(245,158,11,.08); }

      /* Page titles */
      .page-title { font-size: 22px; font-weight: 800; color: #edf0f7; letter-spacing: -.3px; }
      .page-sub { font-size: 13px; color: #6b7490; margin-top: 4px; }

      /* Misc */
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-between { justify-content: space-between; }
      .gap-2 { gap: 8px; }
      .mt-4 { margin-top: 16px; }
      .mb-4 { margin-bottom: 16px; }
      .empty-state { text-align: center; padding: 60px 20px; color: #6b7490; }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── MOBILE RESPONSIVE ── */
      @media (max-width: 768px) {
        .main-content {
          margin-left: 0 !important;
          padding: 72px 14px 24px 14px !important;
          width: 100% !important;
        }
        table { font-size: 11px; }
        th, td { padding: 9px 10px !important; }
        /* hide less important table columns on mobile */
        .hide-mobile { display: none !important; }
      }
      @media (max-width: 480px) {
        th, td { padding: 8px 8px !important; font-size: 11px; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
